<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --bg2: #111113;
    --surface: #18181b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f4f4f5;
    --text2: #a1a1aa;
    --text3: #52525b;
    --accent: #e4e4e7;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── canvas ── */
  #canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── vignette ── */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 75% 75% at 50% 50%,
      transparent 0%, rgba(10,10,11,0.72) 55%, var(--bg) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── layout ── */
  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    gap: 0;
  }

  /* ── logo mark ── */
  .logomark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 0.5px solid var(--border2);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }
  .logomark svg { width: 22px; height: 22px; }

  /* ── eyebrow ── */
  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    display: block;
    width: 28px;
    height: 0.5px;
    background: var(--text3);
  }

  /* ── headline ── */
  .headline {
    font-size: clamp(48px, 8vw, 88px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.04em;
    text-align: center;
    color: transparent;
    background: linear-gradient(135deg,
      #ffffff 0%,
      rgba(255,255,255,0.5) 30%,
      rgba(255,255,255,0.15) 48%,
      rgba(255,255,255,0.85) 54%,
      rgba(255,255,255,0.3) 72%,
      #ffffff 100%
    );
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-stroke: 1px rgba(255,255,255,0.08);
    animation: shimmer 7s linear infinite;
    margin-bottom: 8px;
    max-width: 700px;
    text-align: center;
  }

  .headline em {
    font-style: italic;
    font-weight: 300;
    letter-spacing: -0.02em;
    font-size: 0.9em;
  }

  @keyframes shimmer {
    0%   { background-position: 250% center; }
    100% { background-position: 0%   center; }
  }

  /* ── sub headline ── */
  .sub {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text3);
    margin-bottom: 36px;
    text-align: center;
  }

  /* ── description ── */
  .description {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text2);
    max-width: 400px;
    text-align: center;
    font-weight: 400;
    margin-bottom: 48px;
  }

  /* ── divider ── */
  .divider {
    width: 40px;
    height: 0.5px;
    background: var(--border2);
    margin-bottom: 48px;
  }

  /* ── "coming anytime" badge ── */
  .anytime-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 100px;
    border: 0.5px solid var(--border2);
    background: var(--surface);
    margin-bottom: 48px;
  }
  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #a1f0a0;
    position: relative;
    flex-shrink: 0;
  }
  .pulse-dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: rgba(161,240,160,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50%       { transform: scale(1.6); opacity: 0; }
  }
  .anytime-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.01em;
  }
  .anytime-text strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── email form ── */
  .form-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 14px;
  }
  .email-in {
    flex: 1;
    height: 44px;
    padding: 0 16px;
    font-size: 14px;
    font-family: inherit;
    border: 0.5px solid var(--border2);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .email-in::placeholder { color: var(--text3); }
  .email-in:focus { border-color: rgba(255,255,255,0.28); }

  .notify-btn {
    height: 44px;
    padding: 0 20px;
    border-radius: 10px;
    background: var(--text);
    color: var(--bg);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.12s;
    letter-spacing: 0.01em;
  }
  .notify-btn:hover  { opacity: 0.88; }
  .notify-btn:active { transform: scale(0.97); }

  .form-msg {
    font-size: 13px;
    min-height: 20px;
    color: #86efac;
    text-align: center;
  }
  .form-msg.err { color: #fca5a5; }

  /* ── socials ── */
  .socials {
    display: flex;
    gap: 10px;
    margin-top: 52px;
  }
  .social-link {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--text3);
    transition: color 0.15s, border-color 0.15s;
  }
  .social-link:hover { color: var(--text2); border-color: var(--border2); }
  .social-link svg { width: 16px; height: 16px; }

  /* ── brand pills ── */
  .brand-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 56px;
  }
  .brand-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 13px;
    border-radius: 100px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 0.01em;
  }
  .brand-pill svg { width: 13px; height: 13px; opacity: 0.7; }

  /* ── footer ── */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 0.5px solid var(--border);
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.02em;
  }

  /* ── fade-in ── */
  .fade-up {
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .d1 { animation-delay: 0.1s; }
  .d2 { animation-delay: 0.22s; }
  .d3 { animation-delay: 0.34s; }
  .d4 { animation-delay: 0.46s; }
  .d5 { animation-delay: 0.58s; }
  .d6 { animation-delay: 0.70s; }
  .d7 { animation-delay: 0.82s; }
  .d8 { animation-delay: 0.94s; }
  .d9 { animation-delay: 1.06s; }

  @media (max-width: 480px) {
    .form-row { flex-direction: column; }
    .notify-btn { height: 44px; width: 100%; border-radius: 10px; }
    .brand-row { gap: 6px; }
  }
</style>
</head>

<script>
(function () {
  /* ── pixel canvas ── */
  const canvas = document.getElementById('canvas');
  let ctx, pixels = [], animId, W, H;

  const COLORS = [
    'rgba(255,255,255,0.07)',
    'rgba(255,255,255,0.07)',
    'rgba(255,255,255,0.07)',
    'rgba(255,255,255,0.04)',
    'rgba(255,255,255,0.04)',
    'rgba(255,255,255,0.13)',
    'rgba(255,255,255,0.16)',
  ];

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function makePixel(x, y) {
    const cx = W / 2, cy = H / 2;
    const dist  = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
    const delay = dist * 0.45;
    const spd   = rand(0.06, 0.20);
    const maxSz = rand(0.5, 2.2);
    const sStep = rand(0.08, 0.22);
    const cStep = rand(1.5, 3.0) + (W + H) * 0.006;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];

    return {
      x, y, color, delay,
      size: 0, counter: 0,
      spd, maxSz, sStep, cStep,
      minSz: 0.4,
      idle: false, rev: false, shim: false,
      draw() {
        if (this.size <= 0) return;
        const off = 1 - this.size * 0.5;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x + off, this.y + off, this.size, this.size);
      },
      tick() {
        this.idle = false;
        if (this.counter <= this.delay) { this.counter += this.cStep; return; }
        if (this.size >= this.maxSz) this.shim = true;
        if (this.shim) {
          if (this.size >= this.maxSz) this.rev = true;
          else if (this.size <= this.minSz) this.rev = false;
          this.size += this.rev ? -this.spd : this.spd;
        } else {
          this.size += this.sStep;
        }
        this.draw();
      }
    };
  }

  function init() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W;
    canvas.height = H;
    ctx = canvas.getContext('2d');
    pixels = [];
    const GAP = 7;
    for (let x = 0; x < W; x += GAP)
      for (let y = 0; y < H; y += GAP)
        pixels.push(makePixel(x, y));
  }

  function loop() {
    animId = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);
    for (const p of pixels) p.tick();
  }

  function start() {
    cancelAnimationFrame(animId);
    init();
    loop();
  }

  window.addEventListener('resize', start);
  start();

  /* ── email form ── */
  const btn   = document.getElementById('notify-btn');
  const inp   = document.getElementById('email-in');
  const msg   = document.getElementById('form-msg');

  btn.addEventListener('click', () => {
    const val = inp.value.trim();
    msg.className = 'form-msg';
    if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      msg.className = 'form-msg err';
      msg.textContent = 'Please enter a valid email address.';
      return;
    }
    msg.textContent = '✓ You\'re on the list — we\'ll reach out when we\'re live.';
    inp.value = '';
  });

  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') btn.click(); });
})();
</script>
