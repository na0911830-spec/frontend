<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GCX-Coming Soon</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --surface: #18181b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f4f4f5;
    --text2: #a1a1aa;
    --text3: #52525b;
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  #canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 75% 75% at 50% 50%,
      transparent 0%, rgba(10,10,11,0.72) 55%, var(--bg) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .logomark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 0.5px solid var(--border2);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 44px;
  }
  .logomark svg { width: 22px; height: 22px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    display: block;
    width: 28px;
    height: 0.5px;
    background: var(--text3);
  }

  .headline {
    font-size: clamp(52px, 9vw, 96px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.04em;
    text-align: center;
    color: transparent;
    background: linear-gradient(135deg,
      #ffffff 0%,
      rgba(255,255,255,0.5) 30%,
      rgba(255,255,255,0.15) 48%,
      rgba(255,255,255,0.85) 54%,
      rgba(255,255,255,0.3) 72%,
      #ffffff 100%
    );
    background-size: 250% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-stroke: 1px rgba(255,255,255,0.06);
    animation: shimmer 7s linear infinite;
    margin-bottom: 10px;
    max-width: 720px;
  }
  .headline em {
    font-style: italic;
    font-weight: 300;
    letter-spacing: -0.02em;
    font-size: 0.9em;
  }
  @keyframes shimmer {
    0%   { background-position: 250% center; }
    100% { background-position: 0%   center; }
  }

  .sub {
    font-size: clamp(30px, 4.5vw, 48px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text3);
    margin-bottom: 40px;
    text-align: center;
  }

  .divider {
    width: 40px;
    height: 0.5px;
    background: var(--border2);
    margin-bottom: 40px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 100px;
    border: 0.5px solid var(--border2);
    background: var(--surface);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #a1f0a0;
    position: relative;
    flex-shrink: 0;
  }
  .dot::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: rgba(161,240,160,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50%       { transform: scale(1.6); opacity: 0; }
  }
  .badge-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.01em;
  }
  .badge-text strong {
    color: var(--text);
    font-weight: 600;
  }

  /* fade-in animations */
  .fade-up {
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .d1 { animation-delay: 0.10s; }
  .d2 { animation-delay: 0.22s; }
  .d3 { animation-delay: 0.34s; }
  .d4 { animation-delay: 0.46s; }
  .d5 { animation-delay: 0.58s; }
  .d6 { animation-delay: 0.70s; }

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 0.5px solid var(--border);
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="vignette"></div>

<main class="page">

  <div class="logomark fade-up d1">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="3" width="8" height="8" rx="2" fill="white" opacity="0.9"/>
      <rect x="13" y="3" width="8" height="8" rx="2" fill="white" opacity="0.4"/>
      <rect x="3" y="13" width="8" height="8" rx="2" fill="white" opacity="0.4"/>
      <rect x="13" y="13" width="8" height="8" rx="2" fill="white" opacity="0.2"/>
    </svg>
  </div>

  <p class="eyebrow fade-up d2">Work in progress</p>

  <h1 class="headline fade-up d3">
    <em>Something</em><br>Beautiful
  </h1>
  <p class="sub fade-up d3">is on its way.</p>

  <div class="divider fade-up d4"></div>

  <div class="badge fade-up d5">
    <span class="dot"></span>
    <span class="badge-text">Launching <strong>when it's ready</strong> — stay tuned.</span>
  </div>

</main>

<footer class="footer">
  &copy; 2026 &nbsp;·&nbsp; All rights reserved
</footer>

<script>
(function () {
  const canvas = document.getElementById('canvas');
  let ctx, pixels = [], animId, W, H;

  const COLORS = [
    'rgba(255,255,255,0.07)',
    'rgba(255,255,255,0.07)',
    'rgba(255,255,255,0.07)',
    'rgba(255,255,255,0.04)',
    'rgba(255,255,255,0.04)',
    'rgba(255,255,255,0.13)',
    'rgba(255,255,255,0.16)',
  ];

  function rand(a, b) { return Math.random() * (b - a) + a; }

  function makePixel(x, y) {
    const cx = W / 2, cy = H / 2;
    const dist  = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
    const delay = dist * 0.45;
    const spd   = rand(0.06, 0.20);
    const maxSz = rand(0.5, 2.2);
    const sStep = rand(0.08, 0.22);
    const cStep = rand(1.5, 3.0) + (W + H) * 0.006;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];

    return {
      x, y, color, delay,
      size: 0, counter: 0,
      spd, maxSz, sStep, cStep,
      minSz: 0.4,
      idle: false, rev: false, shim: false,
      draw() {
        if (this.size <= 0) return;
        const off = 1 - this.size * 0.5;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x + off, this.y + off, this.size, this.size);
      },
      tick() {
        this.idle = false;
        if (this.counter <= this.delay) { this.counter += this.cStep; return; }
        if (this.size >= this.maxSz) this.shim = true;
        if (this.shim) {
          if (this.size >= this.maxSz) this.rev = true;
          else if (this.size <= this.minSz) this.rev = false;
          this.size += this.rev ? -this.spd : this.spd;
        } else {
          this.size += this.sStep;
        }
        this.draw();
      }
    };
  }

  function init() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W;
    canvas.height = H;
    ctx = canvas.getContext('2d');
    pixels = [];
    const GAP = 7;
    for (let x = 0; x < W; x += GAP)
      for (let y = 0; y < H; y += GAP)
        pixels.push(makePixel(x, y));
  }

  function loop() {
    animId = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);
    for (const p of pixels) p.tick();
  }

  function start() {
    cancelAnimationFrame(animId);
    init();
    loop();
  }

  window.addEventListener('resize', start);
  start();
})();
</script>
</body>
</html>
